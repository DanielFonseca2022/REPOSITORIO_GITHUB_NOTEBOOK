<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Clientes</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <div class="card">

            <h1>Cadastro de Clientes</h1>

            <form>

                <div class="grid">

                    <div class="campo">
                        <label>Nome Completo</label>
                        <input type="text" placeholder="Digite o nome">
                    </div>

                    <div class="campo">
                        <label>CPF</label>
                        <input type="text" placeholder="000.000.000-00">
                    </div>

                    <div class="campo">
                        <label>RG</label>
                        <input type="text">
                    </div>

                    <div class="campo">
                        <label>Data de Nascimento</label>
                        <input type="date">
                    </div>

                    <div class="campo">
                        <label>Email</label>
                        <input type="email">
                    </div>

                    <div class="campo">
                        <label>Telefone</label>
                        <input type="tel">
                    </div>

                    <div class="campo">
                        <label>Celular</label>
                        <input type="tel">
                    </div>

                    <div class="campo">
                        <label>Estado Civil</label>

                        <select>
<option>Selecione</option>
<option>Solteiro</option>
<option>Casado</option>
<option>Divorciado</option>
<option>Viúvo</option>
</select>

                    </div>

                    <div class="campo">
                        <label>Profissão</label>
                        <input type="text">
                    </div>

                    <div class="campo">
                        <label>Empresa</label>
                        <input type="text">
                    </div>

                    <div class="campo full">
                        <label>Endereço</label>
                        <input type="text">
                    </div>

                    <div class="campo">
                        <label>Número</label>
                        <input type="text">
                    </div>

                    <div class="campo">
                        <label>Bairro</label>
                        <input type="text">
                    </div>

                    <div class="campo">
                        <label>Cidade</label>
                        <input type="text">
                    </div>

                    <div class="campo">
                        <label>Estado</label>

                        <select>

<option>SP</option>
<option>RJ</option>
<option>MG</option>
<option>PR</option>

</select>

                    </div>

                    <div class="campo">
                        <label>CEP</label>
                        <input type="text">
                    </div>

                    <div class="campo full">

                        <label>Observações</label>

                        <textarea rows="5"></textarea>

                    </div>

                </div>

                <div class="botoes">

                    <button type="reset" class="cancelar">Cancelar</button>

                    <button type="submit" class="salvar">Salvar Cadastro</button>

                </div>

            </form>

        </div>

    </div>

</body>

</html>
